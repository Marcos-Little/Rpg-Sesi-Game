<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG da Turma — Ranking</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .ranking-header {
      padding: 40px 0 28px;
      text-align: center;
    }
    .ranking-header h1 { margin-bottom: 6px; }
    .ranking-header p  { color: var(--text-muted); font-family: var(--font-title); font-size: 0.88rem; letter-spacing: 0.1em; }

    /* Filter tabs */
    .filter-tabs {
      display: flex; justify-content: center; gap: 8px;
      flex-wrap: wrap; margin-bottom: 32px;
    }
    .filter-tab {
      font-family: var(--font-title); font-size: 0.82rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 8px 20px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-muted);
      cursor: pointer; transition: all var(--transition);
    }
    .filter-tab:hover  { border-color: var(--border-bright); color: var(--text-bright); }
    .filter-tab.ativo  {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--bg-void); border-color: var(--gold);
      box-shadow: 0 0 15px var(--gold-glow);
    }

    /* Podium */
    .podium {
      display: flex; justify-content: center; align-items: flex-end;
      gap: 12px; margin-bottom: 36px; padding: 0 12px;
    }

    .podium-item {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 180px;
    }

    .podium-card {
      width: 100%;
      border-radius: var(--radius-lg);
      padding: 16px 12px;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--bg-card);
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
    }
    .podium-card:hover { transform: translateY(-4px); }

    .podium-1 .podium-card {
      border-color: #FFD700;
      background: linear-gradient(160deg, var(--bg-card), rgba(255,215,0,0.06));
      box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }
    .podium-2 .podium-card { border-color: #A0A0A0; }
    .podium-3 .podium-card { border-color: #8B6914; }

    .podium-medal { font-size: 1.8rem; margin-bottom: 8px; display: block; }
    .podium-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--border-bright);
      overflow: hidden;
      background: var(--bg-deep);
      margin: 0 auto 10px;
    }
    .podium-1 .podium-avatar { width: 76px; height: 76px; border-color: #FFD700; }
    .podium-avatar img { width: 100%; height: 100%; object-fit: contain; }
    .podium-nome { font-family: var(--font-title); font-size: 0.88rem; color: var(--gold-text); margin-bottom: 4px; }
    .podium-info { font-size: 0.75rem; color: var(--text-muted); }

    .podium-block {
      width: 100%; border-radius: var(--radius) var(--radius) 0 0;
      margin-top: 8px;
    }
    .podium-1 .podium-block { height: 48px; background: linear-gradient(180deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); }
    .podium-2 .podium-block { height: 32px; background: linear-gradient(180deg, rgba(160,160,160,0.2), transparent); }
    .podium-3 .podium-block { height: 20px; background: linear-gradient(180deg, rgba(139,105,20,0.2), transparent); }

    /* Lista */
    .ranking-lista { display: flex; flex-direction: column; gap: 8px; margin-bottom: 60px; }

    .ranking-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      transition: all var(--transition);
      cursor: default;
    }
    .ranking-item:hover { border-color: var(--border); background: var(--bg-hover); }
    .ranking-item.destaque { border-color: var(--gold-dim); background: rgba(212,160,23,0.05); }

    .rank-pos {
      font-family: var(--font-title); font-weight: 700;
      font-size: 0.9rem; min-width: 32px; text-align: center;
    }

    .rank-avatar {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 50%; border: 1px solid var(--border);
      overflow: hidden; background: var(--bg-surface);
    }
    .rank-avatar img { width: 100%; height: 100%; object-fit: contain; }

    .rank-info { flex: 1; min-width: 0; }
    .rank-nome  { font-family: var(--font-title); font-size: 0.92rem; color: var(--text-bright); }
    .rank-meta  { font-size: 0.78rem; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }

    .rank-stats { text-align: right; flex-shrink: 0; }
    .rank-level { font-family: var(--font-title); font-size: 0.82rem; color: var(--gold-text); }
    .rank-xp    { font-size: 0.75rem; color: var(--xp-green); }
  </style>
</head>
<body>
  <div class="bg-texture"></div>

  <nav class="nav">
    <div class="nav-inner">
      <span class="nav-brand">⚔️ RPG da Turma</span>
      <div class="nav-links" id="nav-actions">
        <!-- preenchido por JS -->
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container-md">

      <div class="ranking-header page-enter">
        <h1>🏆 Hall da Fama</h1>
        <p>Os maiores heróis do reino</p>
      </div>

      <div class="filter-tabs page-enter" id="filter-tabs">
        <button class="filter-tab ativo" data-turma="geral" onclick="trocarTurma(this)">⚔️ Geral</button>
        <button class="filter-tab" data-turma="6A" onclick="trocarTurma(this)">6A</button>
        <button class="filter-tab" data-turma="6B" onclick="trocarTurma(this)">6B</button>
        <button class="filter-tab" data-turma="7A" onclick="trocarTurma(this)">7A</button>
        <button class="filter-tab" data-turma="7B" onclick="trocarTurma(this)">7B</button>
      </div>

      <div id="podium-wrap" class="page-enter"></div>
      <div id="ranking-lista" class="ranking-lista page-enter"></div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config/supabase.js"></script>
  <script src="js/services/auth.js"></script>
  <script src="js/services/db-alunos.js"></script>
  <script src="js/logic/game-logic.js"></script>
  <script src="js/logic/virtudes.js"></script>
  <script>
    // Nav dinâmico (aluno ou professor)
    const aluno = getAlunoLogado();
    const professor = getProfessorLogado();
    const navActions = document.getElementById('nav-actions');

    if (aluno) {
      navActions.innerHTML = `<a href="personagem.html" class="btn btn-secondary btn-sm">⚔️ Meu Personagem</a><a href="ranking-virtudes.html" class="btn btn-secondary btn-sm">✨ Virtudes</a><button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>`;
    } else if (professor) {
      navActions.innerHTML = `<a href="painel-professor.html" class="btn btn-secondary btn-sm">🏰 Painel</a><button class="btn btn-secondary btn-sm" onclick="logout()">Sair</button>`;
    } else {
      navActions.innerHTML = `<a href="ranking-virtudes.html" class="btn btn-secondary btn-sm">✨ Virtudes</a>
        <a href="login.html" class="btn btn-primary btn-sm">Entrar</a>`;
    }

    async function carregarRanking(turma) {
      const podiumWrap = document.getElementById('podium-wrap');
      const lista = document.getElementById('ranking-lista');
      podiumWrap.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';
      lista.innerHTML = '';

      try {
        const alunos = await buscarAlunosPorTurma(turma);
        renderPodium(alunos.slice(0, 3));
        renderLista(alunos.slice(3));
      } catch(e) {
        podiumWrap.innerHTML = '';
        lista.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Erro ao carregar ranking.</p>';
      }
    }

    function renderPodium(top3) {
      const podiumWrap = document.getElementById('podium-wrap');
      if (!top3.length) { podiumWrap.innerHTML = ''; return; }

      // Reordena: 2° | 1° | 3°
      const ordem = [top3[1], top3[0], top3[2]].filter(Boolean);
      const clsSufixos = top3[1] ? ['podium-2','podium-1','podium-3'] : ['podium-1','podium-3'];

      podiumWrap.innerHTML = `<div class="podium">${
        ordem.map((a, i) => {
          const cls = a === top3[0] ? 'podium-1' : a === top3[1] ? 'podium-2' : 'podium-3';
          const pos = top3.indexOf(a) + 1;
          const medal = pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉';
          const { titulo, emoji } = tituloDoLevel(a.level);
          return `
            <div class="podium-item ${cls}">
              <div class="podium-card">
                <span class="podium-medal">${medal}</span>
                <div class="podium-avatar">
                  <img src="${a.avatar||''}" alt="${a.nome}" loading="lazy">
                </div>
                <p class="podium-nome">${a.nome}</p>
                <p class="podium-info">${emoji} Nv.${a.level} · ✨${a.xp} XP</p>
                <p class="podium-info" style="margin-top:2px;font-size:0.72rem;">${a.turma} · ${a.classe||'—'}</p>
                ${(() => { const vd = getVirtude(a.virtude); return vd ? `<p class="podium-info" style="color:${vd.cor};font-size:0.72rem;">${vd.emoji} ${vd.nome}</p>` : ''; })()}
              </div>
              <div class="podium-block"></div>
            </div>
          `;
        }).join('')
      }</div>`;
    }

    function renderLista(alunos) {
      const lista = document.getElementById('ranking-lista');
      lista.innerHTML = '';

      if (!alunos.length && !document.querySelector('.podium-item')) {
        lista.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Nenhum herói nesta turma ainda.</p>';
        return;
      }

      alunos.forEach((a, i) => {
        const pos = i + 4;
        const { titulo, emoji } = tituloDoLevel(a.level);
        const ehMeu = aluno && aluno.id === a.id;
        const el = document.createElement('div');
        el.className = `ranking-item ${ehMeu ? 'destaque' : ''}`;
        const vd = getVirtude(a.virtude);
        const vBadge = vd
          ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:0.72rem;font-family:var(--font-title);color:${vd.cor};border:1px solid ${vd.cor};border-radius:10px;padding:1px 7px;">${vd.emoji} ${vd.nome}</span>`
          : '';
        el.innerHTML = `
          <span class="rank-pos" style="color:var(--text-muted);">#${pos}</span>
          <div class="rank-avatar">
            <img src="${a.avatar||''}" alt="${a.nome}" loading="lazy">
          </div>
          <div class="rank-info">
            <p class="rank-nome">${a.nome} ${ehMeu ? '<span style="color:var(--gold);font-size:0.75rem;">(você)</span>' : ''}</p>
            <div class="rank-meta">
              <span>${a.turma}</span>
              <span>${classeEmoji(a.classe)} ${a.classe||'—'}</span>
              ${vBadge}
              <span>${emoji} ${titulo}</span>
            </div>
          </div>
          <div class="rank-stats">
            <p class="rank-level">Nv.${a.level}</p>
            <p class="rank-xp">✨ ${a.xp} XP</p>
          </div>
        `;
        lista.appendChild(el);
      });
    }

    function trocarTurma(btn) {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      carregarRanking(btn.dataset.turma);
    }

    carregarRanking('geral');
  </script>
</body>
</html>
